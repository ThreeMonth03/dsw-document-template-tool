api:
  url: ${DSW_API_URL}
  token: ${DSW_API_KEY}

tdk:
  executable: ../.venv/bin/dsw-tdk

subjects:
  baseline:
    kind: local_dir
    value: ../outputs/upstream-workspaces/dsw-science-europe/v1.30.0/compact/dsw-science-europe-1.30.0
    stage_id: ci:science-europe-compact:1.30.0
  candidate:
    kind: local_dir
    value: ../outputs/upstream-workspaces/dsw-science-europe/v1.30.0/expanded-regression/dsw-science-europe-1.30.0
    stage_id: ci:science-europe-expanded:1.30.0

regression:
  mode: preview
  format_uuid: a9293d08-59a4-4e6b-ae62-7a6a570b031c
  output_dir: ../outputs/preview
  timeout_seconds: 180
  poll_seconds: 1.0
  cleanup_projects: false
  ignore_patterns:
    - "Generated at: .*"
    - "/\\* DSW Document Template Tool CJK font fallback:start \\*/[\\s\\S]*?/\\* DSW Document Template Tool CJK font fallback:end \\*/"
    - "\"DSW Noto Sans TC\", "

fixtures:
  - name: empty-project
    project:
      name: science-europe empty project
      knowledge_model_package_id: ../fixtures/knowledge-models/root-zh-hant-2.7.0.km
      question_tag_uuids: []
      visibility: PrivateProjectVisibility
      sharing: RestrictedProjectSharing
    events_file: ../fixtures/projects/regression/empty-project.events.json
  - name: wrapped-empty-project
    project:
      name: science-europe wrapped empty project
      knowledge_model_package_id: ../fixtures/knowledge-models/root-zh-hant-2.7.0.km
      question_tag_uuids: []
      visibility: PrivateProjectVisibility
      sharing: RestrictedProjectSharing
    events_file: ../fixtures/projects/regression/wrapped-empty-project.events.json
  - name: filled-demo-project
    project:
      name: science-europe filled demo project
      knowledge_model_package_id: ../fixtures/knowledge-models/root-zh-hant-2.7.0.km
      question_tag_uuids: []
      visibility: PrivateProjectVisibility
      sharing: RestrictedProjectSharing
    events_file: ../fixtures/projects/demo/test-project.events.json
