line-length = 100
target-version = "py311"

[lint]
select = [
  "E",
  "F",
  "I",
  "UP",
]

[lint.per-file-ignores]
# This test intentionally embeds exact upstream Jinja fragments. Keeping those
# strings byte-for-byte readable is more important than wrapping individual
# template lines to Python's line length.
"tests/unit/test_translation_tree.py" = ["E501"]
