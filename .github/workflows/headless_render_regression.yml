name: headless-render-regression

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      upstream_template_test_refs:
        description: "Space-separated upstream Science Europe refs for smoke testing. Use v1.30.0+ for all supported released tags."
        required: false
        default: "latest main v1.30.0+"
      upstream_template_artifact_refs:
        description: "Space-separated released upstream refs to package as clean scaffold artifacts."
        required: false
        default: "v1.21.0+"
      upstream_template_compat_refs:
        description: "Space-separated older upstream refs for non-blocking compatibility smoke tests."
        required: false
        default: "v1.21.0+"

env:
  UPSTREAM_TEMPLATE_REPOSITORY: ds-wizard/science-europe-template
  UPSTREAM_TEMPLATE_TEST_REFS: ${{ github.event.inputs.upstream_template_test_refs || 'latest main v1.30.0+' }}
  UPSTREAM_TEMPLATE_ARTIFACT_REFS: ${{ github.event.inputs.upstream_template_artifact_refs || 'v1.21.0+' }}
  UPSTREAM_TEMPLATE_COMPAT_REFS: ${{ github.event.inputs.upstream_template_compat_refs || 'v1.21.0+' }}

jobs:
  offline-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: make install-dev

      - name: Smoke-test upstream template refs
        run: |
          make test-upstream-tags \
            UPSTREAM_TEMPLATE_REPOSITORY="$UPSTREAM_TEMPLATE_REPOSITORY" \
            UPSTREAM_TEMPLATE_TEST_REFS="$UPSTREAM_TEMPLATE_TEST_REFS"

      - name: Check formatting
        run: make format-check

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

  upstream-compat-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: make install-dev

      - name: Non-blocking smoke-test older upstream refs
        run: |
          set +e
          make test-upstream-compat-tags \
            UPSTREAM_TEMPLATE_REPOSITORY="$UPSTREAM_TEMPLATE_REPOSITORY" \
            UPSTREAM_TEMPLATE_COMPAT_REFS="$UPSTREAM_TEMPLATE_COMPAT_REFS"
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            echo "::warning title=Older upstream compatibility smoke failed::Compatibility refs are advisory and do not block supported-version CI."
            {
              echo "## Older upstream compatibility smoke"
              echo
              echo "Compatibility refs are advisory and do not represent translated support."
              echo
              echo "- Refs: \`$UPSTREAM_TEMPLATE_COMPAT_REFS\`"
              echo "- Status: failed with exit code \`$status\`"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Older upstream compatibility smoke"
              echo
              echo "- Refs: \`$UPSTREAM_TEMPLATE_COMPAT_REFS\`"
              echo "- Status: passed"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          exit 0

  render-regression:
    runs-on: ubuntu-latest
    needs: offline-checks
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - metamodel_key: "16"
            metamodel_version: "16"
            dsw_version: "4.13"
            upstream_template_artifact_refs: "v1.21.0 v1.22.0 v1.23.0 v1.24.0"
            run_preview_regression: "false"
          - metamodel_key: "17-0"
            metamodel_version: "17.0"
            dsw_version: "4.22"
            upstream_template_artifact_refs: "v1.25.0 v1.26.0 v1.27.0 v1.28.0 v1.29.0"
            run_preview_regression: "false"
          - metamodel_key: "17-1"
            metamodel_version: "17.1"
            dsw_version: "4.26"
            upstream_template_artifact_refs: "v1.29.1"
            run_preview_regression: "false"
          - metamodel_key: "18-0"
            metamodel_version: "18.0"
            dsw_version: "4.30"
            upstream_template_artifact_refs: "v1.30.0+"
            run_preview_regression: "true"
    env:
      DSW_API_URL: http://localhost:3000/wizard-api
      DSW_EMAIL: albert.einstein@example.com
      DSW_PASSWORD: password
      DSW_VERSION: ${{ matrix.dsw_version }}
      UPSTREAM_TEMPLATE_PREVIEW_METAMODEL_VERSION: ${{ matrix.metamodel_version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: make install-dev

      - name: Build clean upstream version artifacts
        run: |
          make build-upstream-artifacts \
            UPSTREAM_TEMPLATE_REPOSITORY="$UPSTREAM_TEMPLATE_REPOSITORY" \
            UPSTREAM_TEMPLATE_ARTIFACT_REFS="${{ github.event.inputs.upstream_template_artifact_refs || matrix.upstream_template_artifact_refs }}"

      - name: Start local DSW stack
        run: make start-ci-dsw

      - name: Run preview regression
        if: matrix.run_preview_regression == 'true'
        run: make render-regression-ci

      - name: Render clean upstream version previews
        env:
          DSW_API_URL: http://localhost:3000/wizard-api
          DSW_EMAIL: albert.einstein@example.com
          DSW_PASSWORD: password
          DSW_DOWNLOAD_HOST_ALIAS: host.docker.internal=localhost
        run: make render-upstream-artifact-previews

      - name: Collect DSW logs
        if: always()
        run: make ci-dsw-logs

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-artifacts-metamodel-${{ matrix.metamodel_key }}
          path: outputs/

      - name: Upload clean upstream version artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clean-upstream-version-artifacts-metamodel-${{ matrix.metamodel_key }}
          path: |
            outputs/upstream-workspaces/
            outputs/document-templates/dsw-science-europe/**/scaffold/
            outputs/project-render/dsw-science-europe/**/scaffold/

      - name: Stop local DSW stack
        if: always()
        run: make stop-ci-dsw
