name: headless-render-regression

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      upstream_template_test_refs:
        description: "Space-separated upstream Science Europe refs for smoke testing. Use v1.30.0+ for all supported released tags."
        required: false
        default: "latest main v1.30.0+"

env:
  UPSTREAM_TEMPLATE_REPOSITORY: ds-wizard/science-europe-template
  UPSTREAM_TEMPLATE_TEST_REFS: ${{ github.event.inputs.upstream_template_test_refs || 'latest main v1.30.0+' }}

jobs:
  offline-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: make install-dev

      - name: Smoke-test upstream template refs
        run: |
          make test-upstream-tags \
            UPSTREAM_TEMPLATE_REPOSITORY="$UPSTREAM_TEMPLATE_REPOSITORY" \
            UPSTREAM_TEMPLATE_TEST_REFS="$UPSTREAM_TEMPLATE_TEST_REFS"

      - name: Refresh expanded translation workspace
        run: make transform

      - name: Check expanded workspace is committed
        run: |
          git diff --exit-code -- workspace/document-templates/expanded
          test -z "$(git status --short -- workspace/document-templates/expanded)"

      - name: Refresh translator-facing translation tree
        run: make export-translation-tree

      - name: Check translation tree is committed
        run: |
          git diff --exit-code -- workspace/document-templates/translation
          test -z "$(git status --short -- workspace/document-templates/translation)"

      - name: Validate translation tree sync
        run: make sync-translation-tree

      - name: Upload translated template package
        uses: actions/upload-artifact@v4
        with:
          name: translated-document-template
          path: |
            outputs/document-templates/

      - name: Verify checked-in template workspaces
        run: make verify-workspace

      - name: Check formatting
        run: make format-check

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

  render-regression:
    runs-on: ubuntu-latest
    needs: offline-checks
    timeout-minutes: 45
    env:
      DSW_API_URL: http://localhost:3000/wizard-api
      DSW_EMAIL: albert.einstein@example.com
      DSW_PASSWORD: password
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: make install-dev

      - name: Build translated template package
        run: make sync-translation-tree

      - name: Start local DSW stack
        run: make start-ci-dsw

      - name: Run preview regression
        run: make render-regression-ci

      - name: Render sample project preview
        env:
          DSW_API_URL: http://localhost:3000/wizard-api
          DSW_EMAIL: albert.einstein@example.com
          DSW_PASSWORD: password
          DSW_DOWNLOAD_HOST_ALIAS: host.docker.internal=localhost
        run: make render-project

      - name: Collect DSW logs
        if: always()
        run: make ci-dsw-logs

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-artifacts
          path: outputs/

      - name: Stop local DSW stack
        if: always()
        run: make stop-ci-dsw
