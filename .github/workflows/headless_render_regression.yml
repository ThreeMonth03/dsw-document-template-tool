name: headless-render-regression

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # 02:30 Asia/Taipei every day, before downstream translation sync.
    - cron: "30 18 * * *"
  workflow_dispatch:
    inputs:
      upstream_template_test_refs:
        description: "Space-separated upstream Science Europe refs for current-metamodel smoke testing."
        required: false
        default: "latest main v1.30.0+"
      upstream_template_artifact_refs:
        description: "Space-separated released upstream refs to package as clean scaffold artifacts."
        required: false
        default: "v1.29.1+"

env:
  UPSTREAM_TEMPLATE_REPOSITORY: ds-wizard/science-europe-template
  UPSTREAM_TEMPLATE_TEST_REFS: ${{ github.event.inputs.upstream_template_test_refs || 'latest main v1.30.0+' }}
  UPSTREAM_TEMPLATE_ARTIFACT_REFS: ${{ github.event.inputs.upstream_template_artifact_refs || 'v1.29.1+' }}

permissions:
  contents: write

jobs:
  offline-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: make install-dev

      - name: Smoke-test upstream template refs
        run: |
          make test-upstream-tags \
            UPSTREAM_TEMPLATE_REPOSITORY="$UPSTREAM_TEMPLATE_REPOSITORY" \
            UPSTREAM_TEMPLATE_TEST_REFS="$UPSTREAM_TEMPLATE_TEST_REFS"

      - name: Discover upstream DSW compatibility
        run: |
          make discover-upstream-compat \
            UPSTREAM_TEMPLATE_REPOSITORY="$UPSTREAM_TEMPLATE_REPOSITORY" \
            UPSTREAM_TEMPLATE_DISCOVERY_REFS="$UPSTREAM_TEMPLATE_ARTIFACT_REFS"

      - name: Check formatting
        run: make format-check

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

  render-regression:
    runs-on: ubuntu-latest
    needs: offline-checks
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # BEGIN GENERATED DSW RUNTIME MATRIX
          - metamodel_key: "17-1"
            metamodel_version: "17.1"
            dsw_version: "4.26"
            tdk_version: "4.26.1"
            upstream_template_artifact_refs: "v1.29.1"
            run_preview_regression: "false"
            strict_project_preview: "true"
          - metamodel_key: "18-0"
            metamodel_version: "18.0"
            dsw_version: "4.30"
            tdk_version: "4.30.2"
            upstream_template_artifact_refs: "v1.30.0+"
            run_preview_regression: "true"
            strict_project_preview: "true"
          # END GENERATED DSW RUNTIME MATRIX
    env:
      DSW_API_URL: http://localhost:3000/wizard-api
      DSW_EMAIL: albert.einstein@example.com
      DSW_PASSWORD: password
      DSW_VERSION: ${{ matrix.dsw_version }}
      UPSTREAM_TEMPLATE_PREVIEW_METAMODEL_VERSION: ${{ matrix.metamodel_version }}
      UPSTREAM_TEMPLATE_PREVIEW_STRICT: ${{ matrix.strict_project_preview }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: make install-dev

      - name: Install matching dsw-tdk
        run: |
          .venv/bin/python -m pip install "dsw-tdk==${{ matrix.tdk_version }}"
          .venv/bin/dsw-tdk --version

      - name: Build clean upstream version artifacts
        run: |
          make build-upstream-artifacts \
            UPSTREAM_TEMPLATE_REPOSITORY="$UPSTREAM_TEMPLATE_REPOSITORY" \
            UPSTREAM_TEMPLATE_ARTIFACT_REFS="${{ github.event.inputs.upstream_template_artifact_refs || matrix.upstream_template_artifact_refs }}"

      - name: Start local DSW stack
        run: make start-ci-dsw

      - name: Run preview regression
        if: matrix.run_preview_regression == 'true'
        run: make render-regression-ci

      - name: Render clean upstream version previews
        env:
          DSW_API_URL: http://localhost:3000/wizard-api
          DSW_EMAIL: albert.einstein@example.com
          DSW_PASSWORD: password
          DSW_DOWNLOAD_HOST_ALIAS: host.docker.internal=localhost
        run: make render-upstream-artifact-previews

      - name: Collect DSW logs
        if: always()
        run: make ci-dsw-logs

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-artifacts-metamodel-${{ matrix.metamodel_key }}
          include-hidden-files: true
          path: outputs/

      - name: Upload clean upstream version artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clean-upstream-version-artifacts-metamodel-${{ matrix.metamodel_key }}
          include-hidden-files: true
          path: |
            outputs/upstream-workspaces/
            outputs/document-templates/dsw-science-europe/**/scaffold/
            outputs/project-render/dsw-science-europe/**/scaffold/

      - name: Publish clean scaffold release assets
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          packages=(outputs/document-templates/dsw-science-europe/v*/zh-Hant/scaffold/*.zip)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No clean scaffold packages were produced for this runtime."
            exit 0
          fi

          for package in "${packages[@]}"; do
            version_tag="$(python3 -c 'from pathlib import Path; import sys; print(next(part for part in Path(sys.argv[1]).parts if part.startswith("v") and part[1:2].isdigit()))' "$package")"
            release_tag="clean-scaffold-dsw-science-europe-$version_tag"
            release_title="Clean Science Europe scaffold $version_tag"
            release_dir="outputs/release-assets/clean-scaffold/$version_tag"
            workspace_dir="outputs/upstream-workspaces/dsw-science-europe/$version_tag"
            preview_dir="outputs/project-render/dsw-science-europe/$version_tag/zh-Hant/scaffold"
            workspace_asset="clean-workspace-dsw-science-europe-$version_tag.zip"
            preview_asset="clean-preview-dsw-science-europe-$version_tag.zip"

            python3 scripts/ci/stage_release_assets.py \
              --output-dir "$release_dir" \
              --notes-title "$release_title" \
              --notes-body "Generated by $GITHUB_REPOSITORY run $GITHUB_RUN_ID from commit $GITHUB_SHA." \
              --notes-body "These are clean scaffolds for downstream translation maintenance, not finished public translations." \
              --asset "$package" \
              --archive-dir "$workspace_dir=$workspace_asset" \
              --optional-archive-dir "$preview_dir=$preview_asset"

            if gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh release edit "$release_tag" \
                --repo "$GITHUB_REPOSITORY" \
                --title "$release_title" \
                --notes-file "$release_dir/release-notes.md" \
                --prerelease
            else
              gh release create "$release_tag" \
                --repo "$GITHUB_REPOSITORY" \
                --title "$release_title" \
                --notes-file "$release_dir/release-notes.md" \
                --prerelease \
                --latest=false \
                --target "$GITHUB_SHA"
            fi

            gh release upload "$release_tag" "$release_dir"/* --repo "$GITHUB_REPOSITORY" --clobber
          done

      - name: Stop local DSW stack
        if: always()
        run: make stop-ci-dsw
