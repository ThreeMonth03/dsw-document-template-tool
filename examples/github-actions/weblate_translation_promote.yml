name: DSW Document Template Weblate Promotion

on:
  push:
    branches: ["weblate/v1.30.0"]
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: weblate-promotion-${{ github.ref_name }}
  cancel-in-progress: false

env:
  # Pin this to a released branch/tag in production.
  TOOLING_REPOSITORY: owner/document-template-tool
  TOOLING_REF: main

  TARGET_BRANCH: translation/v1.30.0
  WEBLATE_BRANCH: weblate/v1.30.0

  COMPACT_TEMPLATE_DIR: workspace/document-templates/compact/dsw-science-europe-1.30.0
  EXPANDED_TEMPLATE_DIR: workspace/document-templates/expanded/dsw-science-europe-1.30.0
  TRANSLATION_TREE_DIR: workspace/document-templates/translation/dsw-science-europe-1.30.0
  WEBLATE_XLIFF: weblate/dsw-science-europe.zh_Hant.xlf
  TRANSLATED_TEMPLATE_ORGANIZATION_ID: dsw
  TRANSLATED_TEMPLATE_ID: science-europe-zh-hant
  TRANSLATED_TEMPLATE_VERSION: 1.30.0
  TRANSLATED_TEMPLATE_NAME: Science Europe DMP Template (zh-Hant)
  TRANSLATION_SOURCE_LANG: en
  TRANSLATION_TARGET_LANG: zh_Hant
  PUBLIC_README_PATH: workspace/document-templates/public-readme/README.md
  TRANSLATED_TEMPLATE_DIR: outputs/document-templates/dsw-science-europe/v1.30.0/zh-Hant/dsw-science-europe-zh-hant-1.30.0

jobs:
  promote-weblate-xliff:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref_name, 'weblate/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target translation branch
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository }}
          ref: ${{ env.TARGET_BRANCH }}
          path: template-repo
          fetch-depth: 0

      - name: Checkout DSW document-template tooling
        uses: actions/checkout@v7
        with:
          repository: ${{ env.TOOLING_REPOSITORY }}
          ref: ${{ env.TOOLING_REF }}
          path: tooling-repo

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install tooling dependencies
        working-directory: tooling-repo
        run: make install-dev BOOTSTRAP_PYTHON=python

      - name: Promote Weblate XLIFF into target branch
        id: promote
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          HOST_ROOT="$GITHUB_WORKSPACE/template-repo"
          TOOL_ROOT="$GITHUB_WORKSPACE/tooling-repo"

          "$TOOL_ROOT/.venv/bin/python" "$TOOL_ROOT/scripts/ci/promote_weblate_xliff.py" \
            --host-root "$HOST_ROOT" \
            --tooling-root "$TOOL_ROOT" \
            --target-branch "$TARGET_BRANCH" \
            --weblate-branch "$WEBLATE_BRANCH" \
            --compact-template-dir "$COMPACT_TEMPLATE_DIR" \
            --expanded-template-dir "$EXPANDED_TEMPLATE_DIR" \
            --translation-tree-dir "$TRANSLATION_TREE_DIR" \
            --weblate-xliff "$WEBLATE_XLIFF" \
            --translated-template-dir "$TRANSLATED_TEMPLATE_DIR" \
            --template-organization-id "$TRANSLATED_TEMPLATE_ORGANIZATION_ID" \
            --template-id "$TRANSLATED_TEMPLATE_ID" \
            --template-name "$TRANSLATED_TEMPLATE_NAME" \
            --template-version "$TRANSLATED_TEMPLATE_VERSION" \
            --public-readme "$PUBLIC_README_PATH" \
            --source-lang "$TRANSLATION_SOURCE_LANG" \
            --target-lang "$TRANSLATION_TARGET_LANG" \
            --github-output "$GITHUB_OUTPUT"

      - name: Dispatch target branch sync
        if: steps.promote.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run document_template_translation_sync.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$TARGET_BRANCH"
