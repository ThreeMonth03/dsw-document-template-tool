name: DSW Document Template Translation Sync

on:
  pull_request:
    branches: ["master"]
  schedule:
    # 04:00 Asia/Taipei every day.
    - cron: "0 20 * * *"

permissions:
  contents: write

concurrency:
  group: >-
    document-template-translation-sync-${{ github.event_name == 'pull_request' &&
    github.event.pull_request.head.ref || 'master' }}
  cancel-in-progress: false

env:
  # Pin this to a released branch/tag in production.
  TOOLING_REPOSITORY: ThreeMonth03/DSW-document-template-tool
  TOOLING_REF: master

  # Change only these paths for the host repository.
  COMPACT_TEMPLATE_DIR: workspace/document-templates/compact/dsw-science-europe-1.30.0
  EXPANDED_TEMPLATE_DIR: workspace/document-templates/expanded/dsw-science-europe-1.30.0
  TRANSLATION_TREE_DIR: workspace/document-templates/translation/dsw-science-europe-1.30.0
  TRANSLATED_TEMPLATE_DIR: outputs/document-templates/translated-expanded/dsw-science-europe-1.30.0
  TRANSLATED_TEMPLATE_PACKAGE: outputs/document-templates/translated-expanded/dsw-science-europe-1.30.0.zip
  PROJECT_REF: workspace/projects/test-project.json
  PROJECT_RENDER_OUTPUT: outputs/project-render/test-project.pdf
  PROJECT_RENDER_FORMAT_UUID: 68c26e34-5e77-4e15-9bf7-06ff92582257

jobs:
  translation-sync:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name == 'schedule' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout template repository
        uses: actions/checkout@v4
        with:
          repository: >-
            ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name || github.repository }}
          ref: >-
            ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.ref || 'master' }}
          path: template-repo
          fetch-depth: 0

      - name: Checkout DSW document-template tooling
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TOOLING_REPOSITORY }}
          ref: ${{ env.TOOLING_REF }}
          path: tooling-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling dependencies
        working-directory: tooling-repo
        run: make install-dev BOOTSTRAP_PYTHON=python

      # Keep this step when expanded/translation are checked-in generated inputs.
      # If another repository only wants to package already-committed translation
      # edits, it can remove this step and keep only sync/package below.
      - name: Refresh expanded template and translation tree
        run: |
          set -euo pipefail
          HOST_ROOT="$GITHUB_WORKSPACE/template-repo"
          TOOL_ROOT="$GITHUB_WORKSPACE/tooling-repo"

          "$TOOL_ROOT/.venv/bin/python" "$TOOL_ROOT/src/transform_template.py" expand \
            --source "$HOST_ROOT/$COMPACT_TEMPLATE_DIR" \
            --output "$HOST_ROOT/$EXPANDED_TEMPLATE_DIR"

          "$TOOL_ROOT/.venv/bin/python" "$TOOL_ROOT/src/translation_tree.py" export \
            --source "$HOST_ROOT/$EXPANDED_TEMPLATE_DIR" \
            --output "$HOST_ROOT/$TRANSLATION_TREE_DIR"

      - name: Auto-commit repaired translation inputs
        working-directory: template-repo
        env:
          TARGET_REF: >-
            ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.ref || 'master' }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --short -- "$EXPANDED_TEMPLATE_DIR" "$TRANSLATION_TREE_DIR")" ]; then
            echo "No generated translation input repairs to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$EXPANDED_TEMPLATE_DIR" "$TRANSLATION_TREE_DIR"
          git commit -m "chore(sync): refresh document template translations"
          git push origin "HEAD:$TARGET_REF"

          {
            echo "## Auto-committed translation repairs"
            echo
            echo "The workflow refreshed generated template/translation inputs and pushed"
            echo "the repair commit back to \`$TARGET_REF\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check generated translation inputs are committed
        working-directory: template-repo
        run: |
          set -euo pipefail
          # `outline.md` is a generated progress view. Let CI refresh it without
          # requiring translators to commit checkbox churn before opening a PR.
          git diff --exit-code -- \
            "$EXPANDED_TEMPLATE_DIR" \
            "$TRANSLATION_TREE_DIR/.translation-tree" \
            "$TRANSLATION_TREE_DIR/tree"
          test -z "$(git status --short -- \
            "$EXPANDED_TEMPLATE_DIR" \
            "$TRANSLATION_TREE_DIR/.translation-tree" \
            "$TRANSLATION_TREE_DIR/tree")"

      - name: Sync translations into output template
        run: |
          set -euo pipefail
          HOST_ROOT="$GITHUB_WORKSPACE/template-repo"
          TOOL_ROOT="$GITHUB_WORKSPACE/tooling-repo"
          SYNC_LOG="$(mktemp)"

          if ! "$TOOL_ROOT/.venv/bin/python" "$TOOL_ROOT/src/translation_tree.py" sync \
            --tree "$HOST_ROOT/$TRANSLATION_TREE_DIR" \
            --source "$HOST_ROOT/$EXPANDED_TEMPLATE_DIR" \
            --output "$HOST_ROOT/$TRANSLATED_TEMPLATE_DIR" 2>&1 | tee "$SYNC_LOG"; then
            {
              echo "## Translation sync failed"
              echo
              echo "The translated template could not be generated. Check the message below;"
              echo "it usually points at the exact translation.md file and placeholder issue."
              echo
              echo '```text'
              tail -n 80 "$SYNC_LOG"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            ERROR_LINE="$(grep -E 'Translation(TreeError| is | uses | introduces )|Missing translation document|Invalid translation document' "$SYNC_LOG" | tail -n 1 || true)"
            if [ -n "$ERROR_LINE" ]; then
              echo "::error title=Translation sync failed::$ERROR_LINE"
            else
              echo "::error title=Translation sync failed::See job summary for details."
            fi
            exit 1
          fi

          "$TOOL_ROOT/.venv/bin/dsw-tdk" package "$HOST_ROOT/$TRANSLATED_TEMPLATE_DIR" \
            --output "$HOST_ROOT/$TRANSLATED_TEMPLATE_PACKAGE" \
            --force

      # This boots an ephemeral DSW and copies PROJECT_REF into it. PROJECT_REF
      # can either point at an existing project UUID for a persistent DSW, or at
      # a JSON recipe with `knowledge_model_package_id` and `events_file`.
      - name: Start local DSW stack for sample render
        if: ${{ env.PROJECT_REF != '' }}
        working-directory: tooling-repo
        run: make start-ci-dsw

      - name: Render sample project preview
        if: ${{ env.PROJECT_REF != '' }}
        env:
          DSW_API_URL: http://localhost:3000/wizard-api
          DSW_EMAIL: albert.einstein@example.com
          DSW_PASSWORD: password
          DSW_DOWNLOAD_HOST_ALIAS: host.docker.internal=localhost
        run: |
          set -euo pipefail
          HOST_ROOT="$GITHUB_WORKSPACE/template-repo"
          TOOL_ROOT="$GITHUB_WORKSPACE/tooling-repo"

          "$TOOL_ROOT/.venv/bin/python" "$TOOL_ROOT/src/render_project.py" \
            --project-ref "$HOST_ROOT/$PROJECT_REF" \
            --template-dir "$HOST_ROOT/$TRANSLATED_TEMPLATE_DIR" \
            --format-uuid "$PROJECT_RENDER_FORMAT_UUID" \
            --output "$HOST_ROOT/$PROJECT_RENDER_OUTPUT" \
            --tdk-executable "$TOOL_ROOT/.venv/bin/dsw-tdk"

      - name: Collect local DSW logs
        if: ${{ always() && env.PROJECT_REF != '' }}
        working-directory: tooling-repo
        run: make ci-dsw-logs

      - name: Stop local DSW stack
        if: ${{ always() && env.PROJECT_REF != '' }}
        working-directory: tooling-repo
        run: make stop-ci-dsw

      - name: Auto-commit generated outputs
        working-directory: template-repo
        env:
          TARGET_REF: >-
            ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.ref || 'master' }}
        run: |
          set -euo pipefail
          content_paths=("$TRANSLATED_TEMPLATE_DIR")
          output_paths=("$TRANSLATED_TEMPLATE_DIR" "$TRANSLATED_TEMPLATE_PACKAGE")
          if [ -n "$PROJECT_RENDER_OUTPUT" ]; then
            output_paths+=("$PROJECT_RENDER_OUTPUT")
          fi

          # `dsw-tdk package` embeds UUID/timestamp metadata in the zip. Avoid
          # committing zip/PDF-only churn when the translated template directory
          # did not actually change.
          restore_generated_path() {
            if git ls-files --error-unmatch "$1" >/dev/null 2>&1; then
              git checkout -- "$1"
            else
              rm -rf "$1"
            fi
          }

          if [ -z "$(git status --short -- "${content_paths[@]}")" ]; then
            if [ -n "$(git status --short -- "$TRANSLATED_TEMPLATE_PACKAGE")" ]; then
              restore_generated_path "$TRANSLATED_TEMPLATE_PACKAGE"
            fi
            if [ -n "$PROJECT_RENDER_OUTPUT" ] &&
              [ -n "$(git status --short -- "$PROJECT_RENDER_OUTPUT")" ]; then
              restore_generated_path "$PROJECT_RENDER_OUTPUT"
            fi
            echo "No generated output changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${output_paths[@]}"
          git commit -m "chore(sync): refresh generated document outputs"
          git push origin "HEAD:$TARGET_REF"

          {
            echo "## Auto-committed generated outputs"
            echo
            echo "The workflow refreshed the translated document template and demo"
            echo "project render, then pushed the output commit back to \`$TARGET_REF\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload translated template package
        uses: actions/upload-artifact@v4
        with:
          name: translated-document-template
          path: |
            template-repo/${{ env.TRANSLATED_TEMPLATE_DIR }}
            template-repo/${{ env.TRANSLATED_TEMPLATE_PACKAGE }}
            template-repo/${{ env.PROJECT_RENDER_OUTPUT }}
            template-repo/${{ env.PROJECT_RENDER_OUTPUT }}.json
            tooling-repo/outputs/ci-dsw/

  skip-fork-pr:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Explain fork PR skip policy
        run: echo "Skipping auto-sync commit for fork pull requests."
